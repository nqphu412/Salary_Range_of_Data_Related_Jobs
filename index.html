<!doctype html>
<html>
  <head>
    <title>Salary Prediction</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  </head>
  <body>
    <h1>Data Salary Predictor</h1>
    <div class="grid-container">
      <div class="column1">
        <div class="zone1">
          <!-- Job Title -->
          <div class="container">
            <label
              >Job Title<span style="color: rgb(224, 12, 12)">*</span>:</label
            >
            <select id="job_title" onchange="updateUserFeatures('job_title')">
              <option value="" disabled selected hidden></option>
              <option value="data scientist">Data Scientist</option>
              <option value="machine learning engineer">
                Machine Learning Engineer
              </option>
            </select>
          </div>

          <!-- Seniority -->
          <div class="container">
            <label
              >Seniority Level<span style="color: rgb(224, 12, 12)">*</span
              >:</label
            >
            <select
              id="seniority_level"
              onchange="updateUserFeatures('seniority_level')"
            >
              <option value="" disabled selected hidden></option>
              <option value="1">Junior</option>
              <option value="2">Mid-level</option>
              <option value="3">Senior</option>
              <option value="4">Leader</option>
            </select>
          </div>

          <!-- Status -->
          <div class="container">
            <label
              >Work Status<span style="color: rgb(224, 12, 12)">*</span>:</label
            >
            <select id="status" onchange="updateUserFeatures('status')">
              <option value="" disabled selected hidden></option>
              <option value="hybrid">Hybrid</option>
              <option value="on-site">On-site</option>
              <option value="remote">Remote</option>
            </select>
          </div>

          <!-- Industry -->
          <div class="container">
            <label
              >Industry<span style="color: rgb(224, 12, 12)">*</span>:</label
            >
            <select id="industry" onchange="updateUserFeatures('industry')">
              <option value="" disabled selected hidden></option>
              <option value="Technology">Technology</option>
              <option value="Finance">Finance</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Retail">Retail</option>
              <option value="Education">Education</option>
              <option value="Energy">Energy</option>
              <option value="Manufacturing">Manufacturing</option>
              <option value="Logistics">Logistics</option>
            </select>
          </div>
        </div>

        <div class="zone2 hidden">
          <!-- Continent -->
          <div class="container">
            <label
              >Continent<span style="color: rgb(224, 12, 12)">*</span>:</label
            >
            <select
              id="continent"
              onchange="
                updateUserFeatures('continent');
                showZone3();
              "
            >
              <option value="" disabled selected hidden></option>
              <option value="Asia">Asia</option>
              <option value="Europe">Europe</option>
              <option value="North America">North America</option>
              <option value="Others">Others</option>
            </select>
          </div>
        </div>

        <div class="zone3 hidden">
          <!-- Country -->
          <div class="container">
            <label
              >Country<span style="color: rgb(224, 12, 12)">*</span>:</label
            >
            <select
              id="country"
              onchange="updateUserFeatures('country')"
            ></select>
          </div>

          <!-- Ownership -->
          <div class="container">
            <label>Company Ownership:</label>
            <select id="ownership" onchange="updateUserFeatures('ownership')">
              <option value=""></option>
              <option value="Private">Private</option>
              <option value="Public">Public</option>
            </select>
          </div>
        </div>

        <button id="predictButton" onclick="predictSalary()" class="hidden">
          Predict Salary
        </button>

        <h2 id="result"></h2>
      </div>

      <div class="column2">
        <!-- 33 Skills -->
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
